{% extends "base.html" %}
{% from "macros.html" import terminal_header, terminal_button %}

{% block content %}

    <!-- Vendors -->
    <section class="category-panel">
        <div class="category-heading">
            {{ terminal_header("\\\\ MANAGE ", "CATEGORIES") }}
        </div>
        {% for cat in categories %}
            <a
                class="vendor-row-link"
                href="{{ url_for('edit_category', category_id=cat.id) }}"
            >
                <div class="vendor-row">
                    <span class="vendor-row-name">
                        {{ cat.name }}
                    </span>
                    <span class="vendor-row-date">
                        {{ cat.sort_order }}
                    </span>
                    <span class="
                        vendor-row-balance
                    ">
                        EDIT
                    </span>
                </div>
            </a>
        {% endfor %}
    </section>


<div class="bottom-actions">

</div>

{% endblock %}
