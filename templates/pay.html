{% extends "base.html" %}

{% block content %}

<div class="card">
    <h1>Record Payment</h1>
    <h3>{{ vendor.name }}</h3>

    <div class="display-row">
        <span class="display-label">Current Balance</span>

        <span class="display-value">
            ${{ "%.2f"|format(total_owed) }}
        </span>
    </div>

    <form
        action="{{ url_for('save_payment', vendor_id=vendor.id) }}"
        method="POST"
        enctype="multipart/form-data"
    >
        <label for="payment_date">Payment Date</label>
        <input
            type="date"
            id="payment_date"
            name="payment_date"
            value="{{ today }}"
            required
        >

        <label for="amount_paid">Amount Paid</label>
        <input
            type="number"
            id="amount_paid"
            name="amount_paid"
            step="0.01"
            min="0"
            value="{{ '%.2f'|format(total_owed) }}"
            required
        >

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes"></textarea>

        <label for="confirmation_number">Confirmation Number</label>
        <input
            type="text"
            id="confirmation_number"
            name="confirmation_number"
        >

        <button type="submit">Record Payment</button>
    </form>
</div>

{% endblock %}
