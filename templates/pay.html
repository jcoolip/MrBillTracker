{% extends "base.html" %}

{% block content %}
    <h1>Payment</h1>

<input type="hidden" name="bill_id" value="{{ bill.id }}">

<form action="{{ url_for('save_payment', bill_id=bill.id) }}" method="POST" enctype="multipart/form-data">        <label for="pmt_date">Payment Date</label>
        <input type="date" id="pmt_date" name="pmt_date" required>

        <label for="pmt_amt">Amount Paid</label>
        <input type="number" step="0.01" id="pmt_amt" name="pmt_amt" required>

        <label for="pmt_notes">Notes</label>
        <textarea id="pmt_notes" name="pmt_notes"></textarea>

        <label for="confirm_num">Confirmation Number</label>
        <input type="text" id="confirm_num" name="confirm_num">

        <label for="confirm_image">Confirmation Image</label>
        <input type="file" id="confirm_image" name="confirm_image" accept="image/*" capture="environment">

        <button type="submit">Pay</button>
    </form>
{% endblock %}
