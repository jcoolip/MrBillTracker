{% extends "base.html" %}
{% from "macros.html" import terminal_header, terminal_button %}

{% block content %}

    <!-- Vendors -->
    <section class="category-panel">
        <div class="category-heading">
            {{ terminal_header("\\\\ MANAGE ", "VENDORS") }}
        </div>
        {% for vendor in vendors %}
            <a
                class="vendor-row-link"
                href="{{ url_for('edit_vendor', vendor_id=vendor.id) }}"
            >
                <div class="vendor-row">
                    <span class="vendor-row-name">
                        {{ vendor.name }}
                    </span>
                    <span class="vendor-row-date"></span>
                    <span class="
                        vendor-row-balance
                    ">
                        EDIT
                    </span>
                </div>
            </a>
        {% endfor %}
    </section>


<div class="bottom-actions">

</div>

{% endblock %}
