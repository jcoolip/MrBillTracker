{% extends "base.html" %}

{% block content %}
    <h1>Edit Vendor</h1>
    <h3>{{ vendor.name }}</h3>

    <form method="POST">
        <label for="vendor_name">Vendor Name</label>
        <input type="text" id="name" name="name" value="{{ vendor.name }}" required>

        <label for="pmt_url">Payment URL</label>
        <input type="url" id="pmt_url" name="pmt_url" value="{{ vendor.pmt_url }}">

        <button type="submit">Confirm Edit</button>
    </form>
{% endblock %}
