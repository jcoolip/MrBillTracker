{% extends "base.html" %}
{% from "macros.html" import terminal_header %}

{% block content %}

<section class="panel form-screen">
    <div class="category-heading">
        {{ terminal_header("\\\\ EDIT", "VENDOR", "h1") }}
    </div>
    <form method="POST">
        <label for="vendor_name">Vendor Name</label>
        <input type="text" id="name" name="name" value="{{ vendor.name }}" required>

        <label for="category_id">Category</label>
        <select name="category_id" id="category_id">
            {% for cat in categories %}
                <option
                    value="{{ cat.id }}"
                    {% if cat.id == vendor.category_id %}selected{% endif %}
                >
                    {{ cat.name }}
                </option>
            {% endfor %}
        </select>

        <label for="pmt_url">Payment URL</label>
        <input type="url" id="pmt_url" name="pmt_url" value="{{ vendor.pmt_url }}">

        <button type="submit">Confirm Edit</button>
    </form>
{% endblock %}
