{% extends "base.html" %}
{% from "macros.html" import terminal_header %}

{% block content %}

<section class="panel form-screen">
    <div class="category-heading">
        {{ terminal_header("\\\\ EDIT", "VENDOR", "h1") }}
    </div>
    <form method="POST">
        <label for="vendor_name">Vendor Name</label>
        <input type="text" id="name" name="name" value="{{ vendor.name }}" required>

        <label for="category_id">Category</label>
        <select name="category_id" id="category_id">
            {% for cat in categories %}
                <option
                    value="{{ cat.id }}"
                    {% if cat.id == vendor.category_id %}selected{% endif %}
                >
                    {{ cat.name }}
                </option>
            {% endfor %}
        </select>

        <label>Recurring?</label>
        <input type="hidden" name="is_recurring" id="is_recurring" value="{{ 1 if vendor.is_recurring else 0 }}" >
        <button type="button" id="recurring-toggle" class="button recurring-toggle">
            <span class="toggle-value">
                {{ "YES" if vendor.is_recurring else "NO" }}
            </span>
        </button>

        <div id="recurring-fields">
            <label for="recurring_amount">Bill Amount</label>
            <input type="text" id="recurring_amount" name="recurring_amount" value="{{ vendor.recurring_amount if vendor.is_recurring else '' }}">
        
            <label for="recurring_due_day">Day of Month</label>
            <input type="text" id="recurring_due_day" name="recurring_due_day" value="{{ vendor.recurring_due_day if vendor.is_recurring else '' }}">
        </div>
        <label for="pmt_url">Payment URL</label>
        <input type="url" id="pmt_url" name="pmt_url" value="{{ vendor.pmt_url }}">

        <button type="submit">Confirm Edit</button>
    </form>

<script>
    const input = document.getElementById("is_recurring");
    const button = document.getElementById("recurring-toggle");
    const value = button.querySelector(".toggle-value");
    const recurringFields = document.getElementById("recurring-fields");
    
    function updateRecurringFields() {
        recurringFields.hidden = input.value !== "1";
    }

    button.addEventListener("click", () => {
        input.value = input.value === "1" ? "0" : "1";
        value.textContent = input.value === "1" ? "YES" : "NO";
        updateRecurringFields();

    });

    updateRecurringFields();

</script>

{% endblock %}
