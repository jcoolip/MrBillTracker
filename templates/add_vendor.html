{% extends "base.html" %}

{% block content %}

<div class="card">
    <h1>Add Vendor</h1>
    <h3></h3>

    <form
        action="{{ url_for('save_vendor') }}"
        method="POST"
        enctype="multipart/form-data"
    >
        <label for="name">Vendor Name</label>
        <input
            type="text"
            id="name"
            name="name"
            required
        >

        <label for="pmt_url">Payment URL</label>
        <input
            type="url"
            id="pmt_url"
            name="pmt_url"
        >

        <button type="submit">Add Vendor</button>
    </form>
</div>

{% endblock %}
