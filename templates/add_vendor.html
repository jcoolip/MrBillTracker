{% extends "base.html" %}
{% from "macros.html" import terminal_header, terminal_button %}

{% block content %}

<section class="panel form-screen">
    <div class="category-heading">
        {{ terminal_header("\\\\ INSERT", "VENDOR") }}
    </div>
    <form
        action="{{ url_for('save_vendor') }}"
        method="POST"
        enctype="multipart/form-data"
    >
        <label for="name">Vendor Name</label>
        <input
            type="text"
            id="name"
            name="name"
            required
        >

        <label for="category">Category</label>
        <select name="category_id">
            {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
        </select>

        <label>Recurring?</label>
        <input type="hidden" name="is_recurring" id="is_recurring">
        <button type="button" id="recurring-toggle" class="button recurring-toggle">
            <span class="toggle-value">
                NO
            </span>
        </button>

        <div id="recurring-fields">
            <label for="recurring_amount">Bill Amount</label>
            <input type="text" id="recurring_amount" name="recurring_amount">
        
            <label for="recurring_due_day">Day of Month</label>
            <input type="text" id="recurring_due_day" name="recurring_due_day" >
        </div>


        <label for="pmt_url">Payment URL</label>
        <input
            type="url"
            id="pmt_url"
            name="pmt_url"
        >

        <button type="submit">Add Vendor</button>
    </form>
</section>

<script>
    const input = document.getElementById("is_recurring");
    const button = document.getElementById("recurring-toggle");
    const value = button.querySelector(".toggle-value");
    const recurringFields = document.getElementById("recurring-fields");
    
    function updateRecurringFields() {
        recurringFields.hidden = input.value !== "1";
    }

    button.addEventListener("click", () => {
        input.value = input.value === "1" ? "0" : "1";
        value.textContent = input.value === "1" ? "YES" : "NO";
        updateRecurringFields();

    });

    updateRecurringFields();

</script>

{% endblock %}
