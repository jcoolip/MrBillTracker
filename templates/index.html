{% extends "base.html" %}

{% block content %}

{% for vendor in vendors %}

<a href="{{ url_for('view_vendor', vendor_id=vendor.id) }}">
<div class="card">
    <h3>
        {{ vendor.name }}
    </h3>

    <div class="display-row">
        <span class="display-label">Balance</span>

        <span class="display-value">
            ${{ "%.2f"|format(vendor.total_owed) }}
        </span>
        <span class="display-label">Due Date</span>
        <span class="display-value">
            {{ vendor.next_due_date }}
        </span>
    </div>
</div>
</a>

{% endfor %}

<div class="bottom-actions">
    <a class="button add-button" href="{{ url_for('add_bill') }}">
        [ New Bill ]
    </a>
    <a class="button add-button" href="{{ url_for('add_vendor') }}">
        [ New Vendor ]
    </a>
</div>

{% endblock %}
